<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#3B6D11">
<title>Se essa rua fosse minha</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#3B6D11;--green-l:#EAF3DE;--green-m:#639922;--green-d:#27500A;
  --amber:#BA7517;--amber-l:#FAEEDA;--amber-m:#EF9F27;
  --teal:#1D9E75;--teal-l:#E1F5EE;
  --purple:#534AB7;--purple-l:#EEEDFE;
  --gray-l:#F1EFE8;--surface:#fff;--bg:#f4f4f0;
  --border:#e0ddd6;--text:#1a1a18;--text2:#5F5E5A;--text3:#888780;
  --r:10px;--rl:16px;
  --ff:'Nunito',sans-serif;--fft:'Fredoka One',cursive;
}
html,body{min-height:100%;background:var(--bg);font-family:var(--ff);color:var(--text)}

.topbar{background:var(--green);padding:10px 16px;display:flex;align-items:center;gap:10px}
.tb-logo{width:30px;height:30px;background:var(--amber-m);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.tb-title{font-family:var(--fft);font-size:16px;color:#fff}
.tb-sub{font-size:10px;color:#C0DD97;margin-left:2px}
.demo-tag{margin-left:auto;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);color:#fff;font-size:9px;font-weight:800;padding:3px 9px;border-radius:20px;letter-spacing:.5px}

/* hero */
.hero{background:var(--green);padding:20px 16px 26px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-20px;right:-20px;width:110px;height:110px;border-radius:50%;background:rgba(255,255,255,.06)}
.hero-bc{font-size:10px;color:rgba(255,255,255,.6);margin-bottom:5px}
.hero-rua{font-family:var(--fft);font-size:24px;color:#fff;line-height:1.1}
.hero-cidade{font-size:12px;color:#9FE1CB;margin-top:4px}
.hero-badge{position:absolute;top:14px;right:14px;background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.3);border-radius:var(--r);padding:4px 10px;font-size:10px;color:#fff;font-weight:700}

/* demo notice */
.demo-notice{background:var(--amber-l);border-bottom:2px solid var(--amber-m);padding:10px 16px;display:flex;align-items:center;gap:10px;font-size:12px;color:var(--amber);font-weight:700}

/* body */
.body{padding:0 14px 80px;max-width:500px;margin:0 auto}
.sec{background:var(--surface);border-radius:var(--rl);border:1px solid var(--border);padding:14px 16px;margin-top:14px}
.sec-t{font-size:10px;font-weight:800;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:9px}
.bio{font-size:14px;line-height:1.75;color:var(--text)}
.dr{display:flex;justify-content:space-between;align-items:flex-start;padding:5px 0;border-bottom:1px solid var(--border);font-size:13px;gap:8px}
.dr:last-child{border-bottom:none}
.dk{color:var(--text2)}.dv{font-weight:700;text-align:right}

/* qr section */
.qr-sec{display:flex;flex-direction:column;align-items:center;gap:8px}
#qrCanvas{border-radius:var(--r);border:1px solid var(--border)}
.qr-url{font-size:10px;color:var(--text3);text-align:center;word-break:break-all;max-width:260px}
.share-row{display:flex;gap:8px;margin-top:4px}
.share-btn{background:var(--green-l);border:1px solid var(--green-m);border-radius:20px;padding:6px 14px;font-size:12px;font-weight:800;color:var(--green-d);cursor:pointer;font-family:var(--ff)}

/* próximo */
.next-sec{background:var(--amber-l);border:1px solid #FAC775;border-radius:var(--rl);padding:13px 16px;margin-top:14px;display:flex;align-items:center;gap:10px}
.next-ic{background:var(--amber);border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;flex-shrink:0}
.next-label{font-size:10px;font-weight:800;color:var(--amber);text-transform:uppercase;letter-spacing:.7px}
.next-name{font-size:14px;font-weight:800;margin-top:2px}
.next-dist{font-size:12px;color:var(--text2)}

/* cta */
.cta{background:var(--purple-l);border:1px solid #AFA9EC;border-radius:var(--rl);padding:14px;margin-top:14px;text-align:center}
.cta-t{font-size:13px;color:var(--purple);font-weight:700;line-height:1.4;margin-bottom:10px}
.cta-btn{background:var(--purple);color:#fff;border:none;border-radius:var(--r);padding:10px 20px;font-family:var(--ff);font-size:13px;font-weight:800;cursor:pointer}

/* erro */
.error-wrap{padding:40px 24px;text-align:center}
.error-ic{font-size:48px;margin-bottom:12px}
.error-title{font-family:var(--fft);font-size:22px;color:var(--text);margin-bottom:8px}
.error-sub{font-size:14px;color:var(--text2);line-height:1.6}

/* loading */
.loading-wrap{padding:60px 24px;text-align:center}
.spinner{width:36px;height:36px;border:3px solid var(--green-l);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="topbar">
  <div class="tb-logo">🗺</div>
  <div>
    <div class="tb-title">Se essa rua fosse minha</div>
    <div class="tb-sub" id="tbSub">Carregando...</div>
  </div>
  <div class="demo-tag">DEMO</div>
</div>

<div id="appContent">
  <div class="loading-wrap">
    <div class="spinner"></div>
    <div style="font-size:14px;color:var(--text2)">Carregando informações da rua...</div>
  </div>
</div>

<script>
function getParams() {
  const p = new URLSearchParams(window.location.search);
  return {
    nome:    p.get('nome')    || '',
    hom:     p.get('hom')     || '',
    nasc:    p.get('nasc')    || '',
    fal:     p.get('fal')     || '',
    bio:     p.get('bio')     || '',
    lei:     p.get('lei')     || '',
    bairro:  p.get('bairro')  || '',
    ext:     p.get('ext')     || '',
    seq:     p.get('seq')     || '—',
    cidade:  p.get('cidade')  || 'Piraí do Sul',
    uf:      p.get('uf')      || 'PR',
    prox:    p.get('prox')    || '',
    proxdist:p.get('proxdist')|| '',
  };
}

function render() {
  const d = getParams();
  const app = document.getElementById('appContent');

  if(!d.nome) {
    app.innerHTML = `
      <div class="error-wrap">
        <div class="error-ic">🔍</div>
        <div class="error-title">Rua não encontrada</div>
        <div class="error-sub">Este QR Code não contém dados de logradouro. Verifique se o código foi gerado corretamente pelo sistema de demonstração.</div>
      </div>`;
    return;
  }

  const per = d.nasc && d.fal ? `${d.nasc}–${d.fal}` : d.nasc || d.fal || '';
  const qrUrl = window.location.href;

  document.getElementById('tbSub').textContent = `${d.cidade} · ${d.uf}`;

  app.innerHTML = `
    <div class="demo-notice">
      <span>🎯</span>
      <span>Demonstração — dados inseridos ao vivo no sistema</span>
    </div>

    <div class="hero">
      <div class="hero-bc">${d.cidade} · ${d.bairro||'Centro'} · Sequência ${d.seq}</div>
      <div class="hero-rua">${d.nome}</div>
      <div class="hero-cidade">${d.cidade} — ${d.uf}</div>
      <div class="hero-badge">QR #${d.seq}</div>
    </div>

    <div class="body">
      <div class="sec">
        <div class="sec-t">QR Code desta rua</div>
        <div class="qr-sec">
          <div id="qrCanvas"></div>
          <div class="qr-url" id="qrUrlTxt"></div>
          <div class="share-row">
            <button class="share-btn" onclick="navigator.share ? navigator.share({title:'${d.nome}', url: window.location.href}) : alert('Copie a URL do navegador para compartilhar')">📤 Compartilhar</button>
            <button class="share-btn" onclick="navigator.clipboard.writeText(window.location.href).then(()=>alert('URL copiada!'))">📋 Copiar URL</button>
          </div>
        </div>
      </div>

      ${d.bio ? `
      <div class="sec">
        <div class="sec-t">Sobre o homenageado</div>
        <div class="bio">${d.bio}</div>
      </div>` : ''}

      <div class="sec">
        <div class="sec-t">Dados da rua</div>
        <div class="dr"><span class="dk">Denominação oficial</span><span class="dv">${d.nome}</span></div>
        ${d.lei ? `<div class="dr"><span class="dk">Lei de nominação</span><span class="dv">${d.lei}</span></div>` : ''}
        ${d.bairro ? `<div class="dr"><span class="dk">Bairro</span><span class="dv">${d.bairro}</span></div>` : ''}
        ${d.ext ? `<div class="dr"><span class="dk">Extensão aprox.</span><span class="dv">${d.ext}</span></div>` : ''}
        ${per ? `<div class="dr"><span class="dk">Período do homenageado</span><span class="dv">${per}</span></div>` : ''}
        <div class="dr"><span class="dk">QR Code nº</span><span class="dv">${d.seq}</span></div>
      </div>

      <div class="sec">
        <div class="sec-t">Galeria</div>
        <div style="display:flex;gap:8px">
          <div style="width:72px;height:56px;background:var(--gray-l);border-radius:var(--r);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:22px">🖼</div>
          <div style="width:72px;height:56px;background:var(--gray-l);border-radius:var(--r);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:22px">📄</div>
          <div style="flex-shrink:0;width:72px;height:56px;background:var(--gray-l);border-radius:var(--r);border:1.5px dashed var(--border);display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:10px;flex-direction:column;gap:2px;cursor:pointer">➕<span>Contribuir</span></div>
        </div>
      </div>

      ${d.prox ? `
      <div class="next-sec">
        <div class="next-ic">›</div>
        <div>
          <div class="next-label">Próximo QR Code</div>
          <div class="next-name">${d.prox}</div>
          <div class="next-dist">${d.proxdist || 'próxima placa na sequência'}</div>
        </div>
      </div>` : ''}

      <div class="cta">
        <div class="cta-t">Entre com sua conta escolar para coletar este selo e ganhar personagens!</div>
        <button class="cta-btn">Entrar e coletar selo</button>
      </div>

      <div style="text-align:center;padding:24px 0 0;font-size:11px;color:var(--text3)">
        Se essa rua fosse minha · Descubra suas Ruas<br>${d.cidade}/${d.uf}
      </div>
    </div>`;

  // Gera QR Code real apontando para esta mesma URL
  setTimeout(() => {
    const wrap = document.getElementById('qrCanvas');
    if(!wrap) return;
    new QRCode(wrap, {
      text: qrUrl,
      width: 130, height: 130,
      colorDark: '#3B6D11', colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.M
    });
    const urlEl = document.getElementById('qrUrlTxt');
    if(urlEl) {
      const display = qrUrl.length > 60 ? qrUrl.substring(0,60)+'...' : qrUrl;
      urlEl.textContent = display;
    }
  }, 100);
}

render();
</script>
</body>
</html>
